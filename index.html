<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0B0F19">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>내 주식 현황</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{font-family:'Noto Sans KR',sans-serif;background:#0B0F19;color:#EDF0FF;min-height:100vh;max-width:480px;margin:0 auto;position:relative}

/* 잠금화면 */
.lock-screen{position:fixed;inset:0;background:#0B0F19;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;max-width:480px;margin:0 auto}
.lock-screen.hidden{display:none}
.lock-title{font-size:22px;font-weight:700;margin-bottom:8px;color:#EDF0FF}
.lock-subtitle{font-size:14px;color:#8A93B8;margin-bottom:36px}
.lock-dots{display:flex;gap:18px;margin-bottom:36px}
.lock-dot{width:14px;height:14px;border-radius:50%;border:2px solid #2A3360;background:transparent;transition:all .15s}
.lock-dot.filled{background:#4D9FFF;border-color:#4D9FFF}
.lock-dot.error{background:#FF4D6A;border-color:#FF4D6A;animation:shake .35s}
.lock-keypad{display:grid;grid-template-columns:repeat(3,88px);gap:16px}
.keypad-btn{background:#1E2540;border:none;color:#EDF0FF;font-size:30px;font-weight:500;height:88px;border-radius:50%;cursor:pointer;font-family:inherit;transition:transform .1s}
.keypad-btn:active{background:#2A3360;transform:scale(.93)}
.keypad-btn.special{background:transparent;cursor:default}
.lock-error{color:#FF4D6A;font-size:13px;margin-top:18px;height:20px;font-weight:500}
.lock-hint{color:#5A6380;font-size:12px;margin-top:8px;text-align:center;line-height:1.5}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

/* Header */
.header{position:sticky;top:0;z-index:50;background:#0B0F19;padding:10px 12px 0;border-bottom:1px solid #1E2540}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.app-title{font-size:16px;font-weight:700;color:#EDF0FF}
.header-btns{display:flex;gap:6px;align-items:center}
.icon-btn{background:#1E2540;border:none;color:#8A93B8;border-radius:7px;padding:5px 10px;font-size:16px;cursor:pointer;line-height:1;font-family:inherit}
.icon-btn:active{background:#2A3360}
.refresh-btn{background:#2A3A6E;border:1px solid #4D9FFF;color:#74C2FF;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit;box-shadow:0 0 8px rgba(77,159,255,0.15)}
.refresh-btn:active{background:#3A4880;transform:scale(0.95)}
.refresh-btn.refreshing{background:#4D9FFF;color:#fff;border-color:#74C2FF}
.spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Menu dropdown */
.menu-dropdown{display:none;position:absolute;right:12px;top:50px;background:#1E2540;border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.5);z-index:100;min-width:180px;overflow:hidden}
.menu-dropdown.open{display:block}
.menu-item{padding:11px 14px;font-size:13px;color:#EDF0FF;cursor:pointer;border-bottom:1px solid #2A3360;font-family:inherit}
.menu-item:last-child{border-bottom:none}
.menu-item:active{background:#2A3360}

/* Tabs */
.tabs{display:flex;gap:0}
.tab{flex:1;text-align:center;padding:10px 0;font-size:15px;font-weight:700;color:#A4ADC9;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap}
.tab.active{color:#4D9FFF;border-bottom-color:#4D9FFF;background:rgba(77,159,255,0.08)}

/* Summary card */
.summary{margin:8px 8px 0;background:#141929;border-radius:10px;padding:12px 14px;border:1px solid #1E2540}
.summary-label{font-size:12px;color:#8A93B8;margin-bottom:3px}
.summary-total{font-size:24px;font-weight:700;color:#EDF0FF;margin-bottom:10px}
.summary-row{display:flex;gap:5px}
.summary-stat{background:#0B0F19;border-radius:7px;padding:7px 8px;min-width:0;overflow:hidden}
.summary-stat.wide{flex:1.4}
.summary-stat.narrow{flex:0.7}
.summary-stat-label{font-size:11px;color:#8A93B8;margin-bottom:2px;white-space:nowrap}
.summary-stat-value{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pos{color:#FF6B85}      /* 수익 - 부드러운 빨강 (한국식) */
.neg{color:#4D9FFF}      /* 손실 - 파란색 (한국식) */
.neu{color:#8A93B8}
/* 강조 색상 */
.qty-val{color:#FFD166;font-weight:700}   /* 수량 - 노란색 */
.avg-val{color:#74C2FF;font-weight:700}   /* 단가 - 하늘색 */

/* Stock list */
.list-header{display:flex;justify-content:space-between;align-items:center;padding:6px 10px 3px}
.list-title{font-size:10px;color:#5A6380}
.stock-list{padding:0 6px;padding-bottom:60px}
.stock-card{background:#141929;border-radius:6px;padding:6px 8px;margin-bottom:3px;border:1px solid #1E2540;cursor:pointer;user-select:none;display:grid;grid-template-columns:1.7fr 1.1fr 1.3fr 0.95fr;gap:5px;align-items:center}
.stock-list-header{display:grid;grid-template-columns:1.7fr 1.1fr 1.3fr 0.95fr;gap:5px;padding:6px 8px;margin:6px 8px 3px;border-bottom:1px solid #1E2540}
.stock-list-header > div{font-size:13px;font-weight:700;color:#8A93B8}
.stock-list-header > div.right{text-align:right}
.header-count{font-size:10px;font-weight:500;color:#5A6380}
.stock-card:active{background:#1a2035}
.cell{display:flex;flex-direction:column;gap:1px;line-height:1.2;min-width:0}
.cell.right{text-align:right}
.cell-top{font-size:13px;font-weight:700;color:#EDF0FF;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cell-bot{font-size:11px;color:#8A93B8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cell-bot.qty-bot{color:#FFD166;font-weight:700}
.cell-bot.avg-bot{color:#74C2FF;font-weight:700}
.loading-price{color:#5A6380;font-size:11px}
.error-price{color:#FFA500;font-size:10px}

/* Watchlist */
.watch-card{background:#141929;border-radius:8px;padding:8px 10px;margin-bottom:5px;border:1px solid #1E2540;display:flex;justify-content:space-between;align-items:center}
.watch-info .watch-name{font-size:14px;font-weight:700;color:#EDF0FF}
.watch-info .watch-code{font-size:10px;color:#5A6380;margin-top:1px}
.watch-price-block{text-align:right}
.watch-price{font-size:14px;font-weight:700;color:#EDF0FF}
.watch-change{font-size:10px;margin-top:1px}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:#5A6380}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.4}
.empty-text{font-size:14px}

/* FAB */
.fab{position:fixed;bottom:24px;right:calc(50% - 240px + 20px);background:#4D9FFF;color:#fff;border:none;border-radius:50%;width:52px;height:52px;font-size:24px;cursor:pointer;box-shadow:0 4px 20px rgba(77,159,255,.4);display:flex;align-items:center;justify-content:center;z-index:100}
@media(max-width:480px){.fab{right:20px}}
.fab:active{transform:scale(.93)}

/* Modal overlay */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#141929;border-radius:20px 20px 0 0;padding:24px 20px 36px;width:100%;max-width:480px;border-top:1px solid #1E2540}
.modal h2{font-size:17px;font-weight:700;margin-bottom:20px}
.check-label{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:#A4ADC9;font-weight:400}
.check-box{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border:1.5px solid #2A3360;border-radius:5px;background:#0B0F19;font-size:13px;color:#4D9FFF;flex-shrink:0;line-height:1}
.check-box.checked{background:#4D9FFF;border-color:#4D9FFF;color:#fff}
.modal-close{position:absolute;right:20px;top:20px;background:none;border:none;color:#5A6380;font-size:22px;cursor:pointer;line-height:1}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;color:#8A93B8;margin-bottom:5px}
.form-group input, .form-group select{width:100%;background:#0B0F19;border:1px solid #2A3360;border-radius:8px;padding:11px 12px;color:#EDF0FF;font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none}
.form-group input:focus, .form-group select:focus{border-color:#4D9FFF}
.form-group select option{background:#141929}
.form-row{display:flex;gap:10px}
.form-row .form-group{flex:1}
.form-hint{font-size:11px;color:#5A6380;margin-top:4px}
.btn-row{display:flex;gap:10px;margin-top:20px}
.btn-primary{flex:1;background:#4D9FFF;color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-primary:active{background:#3A8AE8}
.btn-danger{flex:1;background:#FF4D6A22;color:#FF4D6A;border:1px solid #FF4D6A44;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-danger:active{background:#FF4D6A33}
.btn-ghost{flex:1;background:#1E2540;color:#8A93B8;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}

/* Toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#2A3360;color:#EDF0FF;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .3s;z-index:300;white-space:nowrap}
.toast.show{opacity:1}

/* 예수금 + 오늘 손익 */
.daily-row{margin-top:8px;padding-top:8px;border-top:1px solid #1E2540;display:flex;gap:5px;align-items:center}
.daily-zone{padding:0 8px;min-width:0;overflow:hidden;display:flex;align-items:center}
.daily-zone.wide{flex:1.4}
.daily-zone.narrow{flex:0.7;justify-content:flex-end}
.daily-zone.amt{flex:1.4;justify-content:flex-end}
.daily-label{font-size:12px;color:#8A93B8;white-space:nowrap}
.daily-amt{font-size:14px;font-weight:700;white-space:nowrap}
.daily-pct{font-size:13px;font-weight:700;white-space:nowrap}
.detail-btn{background:#2A3360;border:none;color:#74C2FF;border-radius:5px;padding:3px 8px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;margin-left:6px}
.detail-btn:active{background:#3A4880}
.back-btn{background:#4D9FFF;border:none;color:#fff;border-radius:5px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.back-btn:active{background:#3A8AE8}
.cash-row{margin-top:6px;display:flex;align-items:center;gap:8px}
.cash-label{font-size:12px;color:#8A93B8;white-space:nowrap}
.cash-input{flex:1;background:#0B0F19;border:1px solid #2A3360;border-radius:6px;padding:6px 10px;color:#FFD166;font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;text-align:right;outline:none;min-width:0}
.cash-input:focus{border-color:#4D9FFF}
.cash-unit{font-size:12px;color:#8A93B8}
.cash-save-btn{background:#2A3360;border:none;color:#4D9FFF;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.cash-save-btn:active{background:#3A4880}

/* 자산 입력 행 (자산1, 자산2, ...) */
.asset-row{margin-top:6px;display:flex;align-items:center;gap:5px}
.asset-label{font-size:11px;color:#8A93B8;white-space:nowrap;min-width:36px;flex-shrink:0;font-weight:600}
.asset-memo{flex:1.3;background:#0B0F19;border:1px solid #2A3360;border-radius:5px;padding:5px 7px;color:#EDF0FF;font-size:11px;font-family:inherit;outline:none;min-width:0}
.asset-memo:focus{border-color:#4D9FFF}
.asset-amount{flex:0.95;background:#0B0F19;border:1px solid #2A3360;border-radius:5px;padding:5px 7px;color:#FFD166;font-size:12px;font-weight:700;font-family:inherit;text-align:right;outline:none;min-width:0}
.asset-amount:focus{border-color:#4D9FFF}
.asset-btn{background:#2A3360;border:none;color:#4D9FFF;border-radius:5px;padding:5px 8px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0}
.asset-btn:active{background:#3A4880}
.asset-btn.danger{background:transparent;color:#5A6380;padding:2px 2px;font-size:16px;font-weight:400;width:14px;min-width:14px;line-height:1}
.asset-btn.danger:active{color:#FF6B85;background:transparent}
.asset-btn-placeholder{display:inline-block;width:14px;min-width:14px;flex-shrink:0}
.asset-add-btn{margin-top:6px;float:left;background:transparent;border:1px dashed #4D9FFF;color:#4D9FFF;border-radius:5px;padding:3px 9px;font-size:10px;font-weight:500;cursor:pointer;font-family:inherit}
.asset-add-btn:active{background:#1E2540}
.asset-rows-wrap{overflow:hidden}  /* clear float */

/* 일자별 변화 그래프 */
.history-chart{margin-top:10px;padding-top:10px;border-top:1px solid #1E2540}
.chart-title{font-size:11px;color:#8A93B8;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.chart-title .chart-chg{font-size:11px;font-weight:700}
.chart-svg{width:100%;height:80px;display:block}
.chart-empty{text-align:center;color:#5A6380;font-size:11px;padding:18px 8px;background:#0B0F19;border-radius:6px}

/* 변동 추이 막대 그래프 */
.bar-chart-wrap{display:flex;gap:7px;margin-top:6px;position:relative}
.bar-legend-left{display:flex;flex-direction:column;align-items:flex-start;flex-shrink:0;width:44px;height:180px}
.bar-legend-inner{flex:1;width:100%;position:relative}
.leg-item{position:absolute;left:0;transform:translateY(50%);font-size:9px;font-weight:700;white-space:nowrap;line-height:1;padding-right:8px}
.leg-item::after{content:'';position:absolute;left:100%;width:5px;top:50%;border-top:1px dashed currentColor;opacity:0.85}
.bar-chart{flex:1;display:flex;align-items:flex-end;gap:3px;height:180px;padding:0 2px;min-width:0}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;min-width:0}
.bar-stack{flex:1;width:84%;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;overflow:visible}
.bar-amt-label{display:flex;flex-direction:column;align-items:center;margin-bottom:3px}
.bar-total-inline{font-size:10px;color:#EDF0FF;font-weight:700;white-space:nowrap;line-height:1.2}
.bar-change{font-size:9.5px;white-space:nowrap;line-height:1.2;margin-top:1px;font-weight:600}
.bar-segs{width:100%;display:flex;flex-direction:column;justify-content:flex-end;border-radius:3px 3px 0 0;overflow:hidden}
.bar-seg{overflow:hidden;min-height:0;width:100%}
.bar-date{font-size:11px;color:#A4ADC9;margin-top:5px;white-space:nowrap;font-weight:600}

/* 종목 비중 다이어그램 */
.allocation-chart{margin-top:10px;padding-top:10px;border-top:1px solid #1E2540}
.alloc-title{font-size:11px;color:#8A93B8;margin-bottom:8px;font-weight:600}
.alloc-content{display:flex;gap:12px;align-items:center}
.alloc-svg{width:130px;height:130px;flex-shrink:0}
.alloc-legend{flex:1;display:flex;flex-direction:column;gap:4px;font-size:11px;min-width:0}
.alloc-item{display:flex;align-items:center;gap:6px;line-height:1.4}
.alloc-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.alloc-name{color:#EDF0FF;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.alloc-pct{color:#A4ADC9;font-weight:700;flex-shrink:0}
</style>
</head>
<body>

<!-- 잠금화면 -->
<div class="lock-screen" id="lock-screen">
  <div class="lock-title">📊 내 주식 현황</div>
  <div class="lock-subtitle" id="lock-subtitle">비밀번호 입력</div>
  <div class="lock-dots" id="lock-dots">
    <div class="lock-dot"></div>
    <div class="lock-dot"></div>
    <div class="lock-dot"></div>
    <div class="lock-dot"></div>
  </div>
  <div class="lock-keypad" id="lock-keypad">
    <button class="keypad-btn" data-key="1">1</button>
    <button class="keypad-btn" data-key="2">2</button>
    <button class="keypad-btn" data-key="3">3</button>
    <button class="keypad-btn" data-key="4">4</button>
    <button class="keypad-btn" data-key="5">5</button>
    <button class="keypad-btn" data-key="6">6</button>
    <button class="keypad-btn" data-key="7">7</button>
    <button class="keypad-btn" data-key="8">8</button>
    <button class="keypad-btn" data-key="9">9</button>
    <button class="keypad-btn special"></button>
    <button class="keypad-btn" data-key="0">0</button>
    <button class="keypad-btn" data-key="back">←</button>
  </div>
  <div class="lock-error" id="lock-error"></div>
  <div class="lock-hint" id="lock-hint"></div>
</div>

<div class="header">
  <div class="header-top">
    <span class="app-title">📊 내 주식 현황</span>
    <div class="header-btns">
      <button class="icon-btn" onclick="toggleMenu()" title="메뉴">⋮</button>
      <button class="refresh-btn" onclick="refreshPrices()">
        <span id="refresh-icon">↻</span> 시세 반영
      </button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('mirae1')">미래에셋1</div>
    <div class="tab" onclick="switchTab('mirae2')">미래에셋2</div>
    <div class="tab" onclick="switchTab('mirae3')">미래에셋3</div>
    <div class="tab" onclick="switchTab('samsung')">삼성증권</div>
    <div class="tab" onclick="switchTab('all')">종합</div>
  </div>
</div>

<!-- 메뉴 드롭다운 -->
<div class="menu-dropdown" id="menu-dropdown" onclick="event.stopPropagation()">
  <div class="menu-item" onclick="exportData()">📥 백업 (다운로드)</div>
  <div class="menu-item" onclick="document.getElementById('import-file').click()">📤 복원 (파일 선택)</div>
  <div class="menu-item" onclick="changePin()">🔒 비밀번호 변경</div>
  <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
</div>

<div id="summary-area"></div>
<div class="stock-list" id="stock-list"></div>

<button class="fab" onclick="openAddModal()" id="fab-btn">＋</button>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
  <div class="modal" style="position:relative">
    <h2 id="modal-title">종목 추가</h2>
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="form-group">
      <label>종목명</label>
      <input type="text" id="f-name" placeholder="예) 삼성전자">
    </div>
    <div class="form-group">
      <label>티커 코드</label>
      <input type="text" id="f-code" placeholder="예) 005930.KS" autocapitalize="characters">
      <div class="form-hint">KOSPI: 종목코드.KS &nbsp;|&nbsp; KOSDAQ: 종목코드.KQ &nbsp;|&nbsp; 미국: AAPL, TSLA</div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>보유 수량</label>
        <input type="number" id="f-qty" placeholder="0" min="0">
      </div>
      <div class="form-group">
        <label>매입 단가 (원)</label>
        <input type="number" id="f-avg" placeholder="0" min="0">
      </div>
    </div>
    <div class="form-group" id="f-account-group">
      <label>계좌</label>
      <select id="f-account">
        <option value="mirae1">미래에셋증권 1</option>
        <option value="mirae2">미래에셋증권 2</option>
        <option value="mirae3">미래에셋증권 3</option>

<div class="toast" id="toast"></div>

<script>
// ── Data ──────────────────────────────────────────────────────
const STORAGE_KEY = 'portfolio_v2';
let data = load();
let currentTab = 'mirae1';
let editingId = null;
let isRefreshing = false;
let dailyDetailMode = false;  // 종목별 당일 손익 보기 모드

function load() {
  const defaultData = {
    accounts: {
      mirae1: { name: '미래에셋증권 1', stocks: [], cash: 0 },
      mirae2: { name: '미래에셋증권 2', stocks: [], cash: 0 },
      mirae3: { name: '미래에셋증권 3', stocks: [], cash: 0 },
      samsung: { name: '삼성증권', stocks: [], cash: 0 }
    },
    watchlist: [],
    customAssets: [
      { id: 'a1', memo: '', amount: 0 },
      { id: 'a2', memo: '', amount: 0 },
      { id: 'a3', memo: '', amount: 0 }
    ],
    history: []
  };
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const stored = JSON.parse(raw);
      if (!stored.accounts) stored.accounts = {};
      Object.keys(defaultData.accounts).forEach(key => {
        if (!stored.accounts[key]) {
          stored.accounts[key] = { ...defaultData.accounts[key] };
        } else {
          if (!stored.accounts[key].stocks) stored.accounts[key].stocks = [];
          if (typeof stored.accounts[key].cash !== 'number') stored.accounts[key].cash = 0;
          if (!stored.accounts[key].name) stored.accounts[key].name = defaultData.accounts[key].name;
        }
      });
      if (!stored.watchlist) stored.watchlist = [];
      if (!Array.isArray(stored.history)) stored.history = [];

      // 자산 마이그레이션: 기존 pensionAsset/otherAsset → customAssets
      if (!Array.isArray(stored.customAssets)) {
        stored.customAssets = [
          { id: 'a1', memo: '연금', amount: (typeof stored.pensionAsset === 'number' ? stored.pensionAsset : 0) },
          { id: 'a2', memo: '기타', amount: (typeof stored.otherAsset === 'number' ? stored.otherAsset : 0) },
          { id: 'a3', memo: '', amount: 0 }
        ];
        delete stored.pensionAsset;
        delete stored.otherAsset;
      }
      // 최소 2개는 항상 유지
      while (stored.customAssets.length < 2) {
        stored.customAssets.push({ id: 'a' + (stored.customAssets.length + 1), memo: '', amount: 0 });
      }
      return stored;
    }
  } catch(e) { console.error('Load error:', e); }
  return defaultData;
}

// 오늘 자정 시각의 총자산 스냅샷 저장 (하루 1건, 구성별 분해)
function recordHistorySnapshot(snap) {
  if (!snap || !Number.isFinite(snap.total) || snap.total <= 0) return;
  if (!data.history) data.history = [];
  const today = new Date().toISOString().slice(0, 10);  // YYYY-MM-DD
  const record = {
    date: today,
    mirae1: Math.round(snap.mirae1 || 0),
    mirae2: Math.round(snap.mirae2 || 0),
    assets: (snap.assets || []).map(a => ({ memo: a.memo || '', amount: Math.round(a.amount || 0) })),
    total: Math.round(snap.total)
  };
  const existing = data.history.find(h => h.date === today);
  if (existing) {
    Object.assign(existing, record);
  } else {
    data.history.push(record);
  }
  if (data.history.length > 90) {
    data.history = data.history.slice(-90);
  }
  save();
}

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ── Price Fetch ────────────────────────────────────────────────
// ⚠️ 본인의 Cloudflare Worker URL을 여기에 붙여넣으세요 (끝에 / 없이)
// 예: 'https://stock-proxy.myname.workers.dev'
// 비워두면 공용 프록시만 사용합니다.
const MY_WORKER_URL = 'https://stock-proxy.ssangku2.workers.dev';

const PROXIES = [
  ...(MY_WORKER_URL ? [{ name: '내 프록시', fn: url => `${MY_WORKER_URL}/?url=${encodeURIComponent(url)}` }] : []),
  { name: 'killcors', fn: url => `https://proxy.killcors.com/?url=${encodeURIComponent(url)}` },
  { name: 'allorigins', fn: url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}` },
  { name: 'codetabs', fn: url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}` },
  { name: 'thingproxy', fn: url => `https://thingproxy.freeboard.io/fetch/${url}` },
  { name: 'corsproxy', fn: url => `https://corsproxy.io/?url=${encodeURIComponent(url)}` },
];

// 마지막으로 성공한 프록시 기억
let lastSuccessProxy = null;

async function fetchPrice(symbol) {
  // Worker가 설정되어 있으면 symbol 모드 사용 (한국 주식 = 네이버 실시간, 미국 = Yahoo)
  if (MY_WORKER_URL) {
    try {
      const r = await fetch(`${MY_WORKER_URL}/?symbol=${encodeURIComponent(symbol)}`, {
        signal: AbortSignal.timeout(12000)
      });
      if (r.ok) {
        const result = await r.json();
        if (result.price != null) {
          return {
            price: result.price,
            prev: result.prev,
            currency: result.currency
          };
        }
      }
    } catch(e) {
      console.warn(`[${symbol}] Worker symbol failed: ${e.message}`);
    }
  }

  // Fallback: 공용 프록시 (Yahoo만, 15~20분 지연)
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1d`;
  let orderedProxies = [...PROXIES];
  if (lastSuccessProxy) {
    const idx = orderedProxies.findIndex(p => p.name === lastSuccessProxy);
    if (idx > 0) {
      orderedProxies = [orderedProxies[idx], ...orderedProxies.slice(0, idx), ...orderedProxies.slice(idx+1)];
    }
  }

  let lastErr;
  for (const proxy of orderedProxies) {
    try {
      const r = await fetch(proxy.fn(url), { signal: AbortSignal.timeout(12000) });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const text = await r.text();
      const d = JSON.parse(text);
      const meta = d?.chart?.result?.[0]?.meta;
      if (!meta || meta.regularMarketPrice == null) throw new Error('No data');
      lastSuccessProxy = proxy.name;
      return {
        price: meta.regularMarketPrice,
        prev: meta.previousClose || meta.chartPreviousClose,
        currency: meta.currency
      };
    } catch(e) {
      lastErr = e;
    }
  }
  throw lastErr || new Error('All proxies failed');
}

async function refreshPrices() {
  if (isRefreshing) return;
  isRefreshing = true;
  const icon = document.getElementById('refresh-icon');
  const btn = document.querySelector('.refresh-btn');
  icon.classList.add('spin');
  if (btn) btn.classList.add('refreshing');

  // 모든 종목 코드 수집
  const codes = [];
  ['mirae1','mirae2','mirae3','samsung'].forEach(acc => {
    data.accounts[acc].stocks.forEach(s => {
      if (s.code && !codes.includes(s.code)) codes.push(s.code);
    });
  });

  const results = new Map();
  // 본인 프록시 사용 시 빠르게, 공용 프록시는 천천히
  const useOwnProxy = !!MY_WORKER_URL;
  const DELAY_MS = useOwnProxy ? 50 : 400;
  const CONCURRENCY = useOwnProxy ? 5 : 1;

  async function fetchOne(code) {
    try {
      const r = await fetchPrice(code);
      results.set(code, r);
      return true;
    } catch(e) {
      results.set(code, { error: true });
      return false;
    }
  }

  // 1차: 청크 단위로 처리
  for (let i = 0; i < codes.length; i += CONCURRENCY) {
    const chunk = codes.slice(i, i + CONCURRENCY);
    await Promise.all(chunk.map(fetchOne));
    if (i + CONCURRENCY < codes.length) await new Promise(r => setTimeout(r, DELAY_MS));
  }

  // 2차: 1차에서 실패한 종목만 재시도 (1.5초 대기 후)
  const failedCodes = codes.filter(c => results.get(c)?.error);
  if (failedCodes.length > 0) {
    await new Promise(r => setTimeout(r, 1500));
    for (let i = 0; i < failedCodes.length; i += CONCURRENCY) {
      const chunk = failedCodes.slice(i, i + CONCURRENCY);
      await Promise.all(chunk.map(fetchOne));
      if (i + CONCURRENCY < failedCodes.length) await new Promise(r => setTimeout(r, DELAY_MS));
    }
  }

  // 결과 집계
  let successCount = 0, failCount = 0;
  results.forEach(r => { if (r?.error) failCount++; else successCount++; });

  // 결과 반영: 성공한 종목만 가격 업데이트, 실패한 종목은 이전 가격 유지
  ['mirae1','mirae2','mirae3','samsung'].forEach(acc => {
    data.accounts[acc].stocks.forEach(s => {
      const r = results.get(s.code);
      if (r && !r.error) {
        s.currentPrice = r.price;
        s.prevClose = r.prev;
        s.priceError = false;
        s.lastUpdated = Date.now();
      } else if (r?.error && !s.currentPrice) {
        // 한번도 가격 받은 적 없는 경우만 에러 표시
        s.priceError = true;
      }
      // 이전에 가격을 받은 적이 있으면 priceError 표시하지 않고 기존 가격 유지
    });
  });

  save();
  render();
  isRefreshing = false;
  icon.classList.remove('spin');
  if (btn) btn.classList.remove('refreshing');
  if (failCount === 0) {
    showToast(`✓ ${successCount}개 종목 시세 반영 완료`);
  } else if (successCount === 0) {
    showToast(`⚠ 시세 반영 실패 - 잠시 후 다시 시도하세요`);
  } else {
    showToast(`✓ ${successCount}개 성공 / ${failCount}개 실패 (이전 시세 유지)`);
  }
}

// ── Formatters ────────────────────────────────────────────────
function fmtNum(n) {
  if (n === null || n === undefined) return '-';
  if (n >= 1e8) return (n/1e8).toFixed(1) + '억';
  if (n >= 1e4) return Math.round(n).toLocaleString('ko-KR');
  return n.toLocaleString('ko-KR', {maximumFractionDigits:2});
}

function fmtWon(n) {
  if (n === null || n === undefined) return '-';
  return (n >= 0 ? '+' : '') + Math.round(n).toLocaleString('ko-KR') + '원';
}

function fmtPct(n) {
  if (n === null || n === undefined) return '';
  return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
}

function cls(n) { return n > 0 ? 'pos' : n < 0 ? 'neg' : 'neu'; }

// 부호 없이 천단위 콤마, 원 단위
function fmtPlain(n) {
  if (n === null || n === undefined || isNaN(n)) return '-';
  return Math.round(n).toLocaleString('ko-KR');
}
// 수익률 (퍼센트, +/- 부호 포함)
function fmtPctPlain(n) {
  if (n === null || n === undefined || isNaN(n)) return '-';
  return n.toFixed(2) + '%';
}

// 미래에셋1, 2만 합산 (미래에셋3, 삼성증권 제외)
function aggregateAllStocks() {
  const map = new Map();
  ['mirae1','mirae2'].forEach(acc => {
    data.accounts[acc].stocks.forEach(s => {
      if (!s.code) return;
      const key = s.code;
      if (!map.has(key)) {
        map.set(key, {
          name: s.name,
          code: s.code,
          qty: 0,
          totalCost: 0,
          currentPrice: s.currentPrice,
          prevClose: s.prevClose,
          boughtToday: false,
          accounts: []
        });
      }
      const agg = map.get(key);
      agg.qty += s.qty || 0;
      agg.totalCost += (s.qty || 0) * (s.avgPrice || 0);
      agg.accounts.push(acc);
      if (s.currentPrice) agg.currentPrice = s.currentPrice;
      if (s.prevClose) agg.prevClose = s.prevClose;
      if (s.boughtToday) agg.boughtToday = true;
      if (s.priceError && !agg.currentPrice) agg.priceError = true;
    });
  });
  return [...map.values()].map(s => ({
    ...s,
    avgPrice: s.qty > 0 ? s.totalCost / s.qty : 0,
    id: 'agg-' + s.code
  }));
}

// 종목 카드 HTML 생성 (재사용)
function renderStockCard(s, clickable = true, showDaily = false) {
  const invested = (s.avgPrice||0) * (s.qty||0);
  const currVal = s.currentPrice ? s.currentPrice * (s.qty||0) : null;

  // 누적 손익 (기본)
  const cumPnl = currVal !== null ? currVal - invested : null;
  const cumPct = cumPnl !== null && invested > 0 ? (cumPnl/invested*100) : null;

  // 당일 손익 (당일 매입 종목은 매입가 기준, 그 외는 전일종가 기준)
  const dayBaseUnit = s.boughtToday ? (s.avgPrice || 0) : (s.prevClose || 0);
  const dayPnl = (s.currentPrice && dayBaseUnit) ? (s.currentPrice - dayBaseUnit) * (s.qty||0) : null;
  const dayBase = dayBaseUnit * (s.qty||0);
  const dayPct = dayPnl !== null && dayBase > 0 ? (dayPnl/dayBase*100) : null;

  // 모드에 따라 표시할 값 선택
  const pnl = showDaily ? dayPnl : cumPnl;
  const pnlPct = showDaily ? dayPct : cumPct;

  let pnlAmtCell, pnlPctCell, currValCell, currPriceCell;
  if (s.priceError) {
    pnlAmtCell = `<span class="error-price">조회실패</span>`;
    pnlPctCell = `<span class="neu">-</span>`;
    currValCell = `<span class="neu">-</span>`;
    currPriceCell = `<span class="error-price">-</span>`;
  } else if (s.currentPrice) {
    const dayChg = s.prevClose ? (s.currentPrice - s.prevClose) : 0;
    pnlAmtCell = pnl !== null ? `<span class="${cls(pnl)}">${fmtPlain(pnl)}</span>` : `<span class="neu">-</span>`;
    pnlPctCell = pnlPct !== null ? `<span class="${cls(pnlPct)}">${fmtPctPlain(pnlPct)}</span>` : `<span class="neu">-</span>`;
    currValCell = fmtPlain(currVal);
    currPriceCell = `<span class="${cls(dayChg)}">${fmtPlain(s.currentPrice)}</span>`;
  } else {
    pnlAmtCell = `<span class="loading-price">-</span>`;
    pnlPctCell = `<span class="neu">-</span>`;
    currValCell = `<span class="neu">-</span>`;
    currPriceCell = `<span class="loading-price">시세없음</span>`;
  }

  const onclick = clickable ? `onclick="openEditModal('${s.id}')"` : '';
  return `<div class="stock-card" ${onclick}>
    <div class="cell">
      <span class="cell-top">${s.name}</span>
      <span class="cell-bot qty-bot">${(s.qty||0).toLocaleString()}</span>
    </div>
    <div class="cell right">
      <span class="cell-top">${pnlAmtCell}</span>
      <span class="cell-bot">${pnlPctCell}</span>
    </div>
    <div class="cell right">
      <span class="cell-top">${currValCell}</span>
      <span class="cell-bot">${fmtPlain(invested)}</span>
    </div>
    <div class="cell right">
      <span class="cell-top">${currPriceCell}</span>
      <span class="cell-bot avg-bot">${fmtPlain(s.avgPrice)}</span>
    </div>
  </div>`;
}

function toggleDailyDetail() {
  dailyDetailMode = !dailyDetailMode;
  render();
}

// 종목별 비중 다이어그램 (도넛 + 범례)
function renderAllocationChart(stocks, cash = 0) {
  const valued = stocks
    .filter(s => s.currentPrice && s.qty > 0)
    .map(s => ({ name: s.name, value: s.currentPrice * s.qty }))
    .sort((a, b) => b.value - a.value);

  if (valued.length === 0 && cash <= 0) {
    return `<div class="allocation-chart">
      <div class="alloc-title">📊 종목별 비중 (평가금액 기준)</div>
      <div class="chart-empty">시세 데이터가 없습니다</div>
    </div>`;
  }

  // 상위 7개 + 기타 (종목만 먼저 정리)
  const TOP_N = 7;
  let items;
  if (valued.length > TOP_N + 1) {
    const top = valued.slice(0, TOP_N);
    const otherSum = valued.slice(TOP_N).reduce((s, x) => s + x.value, 0);
    items = [...top, { name: '기타', value: otherSum }];
  } else {
    items = [...valued];
  }
  // 예수금을 항목으로 추가 (있을 때만)
  if (cash > 0) {
    items.push({ name: '예수금', value: cash, isCash: true });
  }

  const total = items.reduce((s, x) => s + x.value, 0);

  const colors = ['#FF6B85','#4D9FFF','#FFD166','#74C2FF','#A78BFA','#FF9F6B','#6BCB77','#5A6380'];
  const CASH_COLOR = '#3DD9A0';  // 예수금 전용 색 (민트)
  const colorFor = (item, i) => item.isCash ? CASH_COLOR : colors[i % colors.length];

  const W = 130, H = 130;
  const cx = W / 2, cy = H / 2;
  const r = 55, innerR = 32;

  let cumAngle = -Math.PI / 2;
  const paths = items.map((item, i) => {
    const sliceAngle = (item.value / total) * 2 * Math.PI;
    const endAngle = cumAngle + sliceAngle;
    const x1 = cx + r * Math.cos(cumAngle);
    const y1 = cy + r * Math.sin(cumAngle);
    const x2 = cx + r * Math.cos(endAngle);
    const y2 = cy + r * Math.sin(endAngle);
    const x3 = cx + innerR * Math.cos(endAngle);
    const y3 = cy + innerR * Math.sin(endAngle);
    const x4 = cx + innerR * Math.cos(cumAngle);
    const y4 = cy + innerR * Math.sin(cumAngle);
    const largeArc = sliceAngle > Math.PI ? 1 : 0;
    const d = `M ${x1.toFixed(1)},${y1.toFixed(1)} A ${r},${r} 0 ${largeArc},1 ${x2.toFixed(1)},${y2.toFixed(1)} L ${x3.toFixed(1)},${y3.toFixed(1)} A ${innerR},${innerR} 0 ${largeArc},0 ${x4.toFixed(1)},${y4.toFixed(1)} Z`;
    cumAngle = endAngle;
    return `<path d="${d}" fill="${colorFor(item, i)}"/>`;
  }).join('');

  const legend = items.map((item, i) => {
    const pct = (item.value / total * 100).toFixed(1);
    return `<div class="alloc-item">
      <span class="alloc-dot" style="background:${colorFor(item, i)}"></span>
      <span class="alloc-name">${item.name}</span>
      <span class="alloc-pct">${pct}%</span>
    </div>`;
  }).join('');

  return `<div class="allocation-chart">
    <div class="alloc-title">📊 종목별 비중 (예수금 포함)</div>
    <div class="alloc-content">
      <svg class="alloc-svg" viewBox="0 0 ${W} ${H}">${paths}</svg>
      <div class="alloc-legend">${legend}</div>
    </div>
  </div>`;
}

// 변동 추이 - 자산 구성 스택 막대 그래프
const SEG_COLORS = ['#FF6B85','#4D9FFF','#FFD166','#A78BFA','#6BCB77','#FF9F6B','#74C2FF','#FF6BC7'];

function getSegments(h) {
  // 옛 데이터 (total만 있는 경우)
  if (h.mirae1 === undefined && h.mirae2 === undefined) {
    return [{ label: '총자산', color: '#5A6380', value: h.total || 0 }];
  }
  const segs = [
    { label: '미래에셋1', color: SEG_COLORS[0], value: h.mirae1 || 0 },
    { label: '미래에셋2', color: SEG_COLORS[1], value: h.mirae2 || 0 }
  ];
  (h.assets || []).forEach((a, i) => {
    segs.push({
      label: a.memo || `자산${i+1}`,
      color: SEG_COLORS[(2 + i) % SEG_COLORS.length],
      value: a.amount || 0
    });
  });
  return segs;
}

// 과거 2일 백필 (이력 부족 시) - 자산은 현재값 고정, 주식은 prevClose 기반
function backfillIfNeeded() {
  if (!data.history) data.history = [];
  if (data.history.length >= 3) return;

  // 종목에 prevClose 있어야 함 (시세 1회 이상 로드된 후)
  const hasPrev = ['mirae1','mirae2'].some(acc =>
    data.accounts[acc].stocks.some(s => s.prevClose)
  );
  if (!hasPrev) return;

  function accPrevValue(acc) {
    return data.accounts[acc].stocks.reduce((sum, st) => {
      const v = st.prevClose ? st.prevClose * (st.qty||0)
              : (st.currentPrice || st.avgPrice || 0) * (st.qty||0);
      return sum + v;
    }, 0);
  }
  const mirae1Prev = accPrevValue('mirae1') + (data.accounts.mirae1.cash || 0);
  const mirae2Prev = accPrevValue('mirae2') + (data.accounts.mirae2.cash || 0);
  const customAssets = data.customAssets || [];
  const customSum = customAssets.reduce((s, a) => s + (a.amount || 0), 0);
  const prevTotal = mirae1Prev + mirae2Prev + customSum;
  if (prevTotal <= 0) return;

  const todayDate = new Date();
  for (let daysAgo = 2; daysAgo >= 1; daysAgo--) {
    const d = new Date(todayDate);
    d.setDate(d.getDate() - daysAgo);
    const dateStr = d.toISOString().slice(0, 10);
    if (data.history.find(h => h.date === dateStr)) continue;
    data.history.push({
      date: dateStr,
      mirae1: Math.round(mirae1Prev),
      mirae2: Math.round(mirae2Prev),
      assets: customAssets.map(a => ({ memo: a.memo || '', amount: Math.round(a.amount || 0) })),
      total: Math.round(prevTotal)
    });
  }
  data.history.sort((a, b) => a.date < b.date ? -1 : a.date > b.date ? 1 : 0);
  save();
}

// 백만원 단위 포맷 (천단위 콤마 + m)
function fmtM(won, decimals = 1) {
  const m = won / 1000000;
  const sign = m < 0 ? '-' : '';
  return sign + Math.abs(m).toLocaleString('ko-KR', { maximumFractionDigits: decimals }) + 'm';
}

// 옛 total-only 막대(회색)에 구성 추정 적용:
// 가장 가까운 구성 막대의 자산은 그대로 두고, 나머지를 주식에 비율 배분
function ensureBreakdown(hist) {
  const ref = hist.find(h => h.mirae1 !== undefined);
  if (!ref) return hist;
  const refAssets = ref.assets || [];
  const refAssetSum = refAssets.reduce((s, a) => s + (a.amount || 0), 0);
  const refStockSum = (ref.mirae1 || 0) + (ref.mirae2 || 0);
  return hist.map(h => {
    if (h.mirae1 !== undefined) return h;  // 이미 구성 있음
    const stockTotal = Math.max(0, (h.total || 0) - refAssetSum);
    const ratio = refStockSum > 0 ? stockTotal / refStockSum : 0;
    return {
      date: h.date,
      mirae1: Math.round((ref.mirae1 || 0) * ratio),
      mirae2: Math.round((ref.mirae2 || 0) * ratio),
      assets: refAssets.map(a => ({ memo: a.memo, amount: a.amount || 0 })),
      total: h.total
    };
  });
}

function renderHistoryChart() {
  // 당분간 최근 7일 일별 표시 (추후 매주 금요일 기준으로 전환 예정)
  const history = ensureBreakdown((data.history || []).slice(-7));

  if (history.length < 1) {
    return `<div class="history-chart">
      <div class="chart-title"><span>📊 변동 추이</span></div>
      <div class="chart-empty">데이터를 모으는 중입니다<br>매일 앱을 열면 추이가 쌓입니다</div>
    </div>`;
  }

  const totals = history.map(h => h.total || 0);
  const maxT = Math.max(...totals, 1);

  // 선형 스케일 (0부터): 동일 금액 = 동일 높이 (최대 78%)
  const SCALE = 78 / maxT;  // % per 원

  const barsHtml = history.map((h, idx) => {
    const total = h.total || 0;
    const barTotalPct = total * SCALE;

    const totalLabel = fmtM(total, 0);  // 총액은 소수점 없이
    let changeHtml;
    if (idx > 0) {
      const chg = total - (history[idx - 1].total || 0);
      const sign = chg > 0 ? '+' : '';
      changeHtml = `<div class="bar-change ${cls(chg)}">(${sign}${fmtM(chg, 1)})</div>`;
    } else {
      changeHtml = `<div class="bar-change neu">&nbsp;</div>`;
    }

    // 세그먼트 (bar-segs 내부에서 비율대로 → 절대 높이는 value*SCALE로 일정)
    const segHtml = getSegments(h).slice().reverse().map(seg => {
      const sharePct = total > 0 ? (seg.value / total * 100) : 0;
      if (sharePct < 0.5) return '';
      return `<div class="bar-seg" style="height:${sharePct.toFixed(1)}%;background:${seg.color}"></div>`;
    }).join('');

    const dateLabel = h.date.slice(5).replace('-', '/');  // MM/DD
    return `<div class="bar-col">
      <div class="bar-stack">
        <div class="bar-amt-label">
          <div class="bar-total-inline">${totalLabel}</div>
          ${changeHtml}
        </div>
        <div class="bar-segs" style="height:${barTotalPct.toFixed(1)}%">${segHtml}</div>
      </div>
      <div class="bar-date">${dateLabel}</div>
    </div>`;
  }).join('');

  // 좌측 범례 — 구성 정보가 있는 가장 최근 막대 기준 (옛 total-only 회색 막대 제외)
  // 3글자, 색상 동일, 아래부터 미래에셋1,2,퇴직연금... 순서
  const legendBar = [...history].reverse().find(h => h.mirae1 !== undefined) || history[history.length - 1];
  const legendSegs = getSegments(legendBar);  // 아래→위 순서 (미래에셋1이 맨 아래)
  let cumBottom = 0;
  const legItemsHtml = legendSegs.map(seg => {
    const segPct = (seg.value || 0) * SCALE;  // bar-stack 대비 % (막대와 동일 스케일)
    const centerPct = cumBottom + segPct / 2;
    cumBottom += segPct;
    const short = seg.label.length > 3 ? seg.label.slice(0, 3) : seg.label;
    return `<div class="leg-item" style="bottom:${centerPct.toFixed(1)}%;color:${seg.color}">${short}</div>`;
  }).join('');
  const legendHtml = `<div class="bar-legend-inner">${legItemsHtml}</div><div class="bar-date" style="visibility:hidden">·</div>`;

  // 시작 대비 변화
  const first = totals[0];
  const last = totals[totals.length - 1];
  const chg = last - first;
  const chgPct = first > 0 ? (chg / first * 100) : 0;

  return `<div class="history-chart">
    <div class="chart-title">
      <span>📊 변동 추이 (${history.length}일)</span>
      <span class="chart-chg ${cls(chg)}">${fmtWon(chg)} (${fmtPct(chgPct)})</span>
    </div>
    <div class="bar-chart-wrap">
      <div class="bar-legend-left">${legendHtml}</div>
      <div class="bar-chart">${barsHtml}</div>
    </div>
  </div>`;
}

function formatCashInput(el) {
  const raw = el.value.replace(/[^0-9]/g, '');

  el.value = parseInt(raw, 10).toLocaleString('ko-KR');

function saveAsset(i) {
  if (!data.customAssets || !data.customAssets[i]) return;
  // 모든 행의 현재 입력값을 캡처 (다른 행 입력 중인 내용 보존)

// 현재 입력 중인 메모/금액 값을 캡처해서 데이터에 반영
function captureAssetInputs() {
  if (!Array.isArray(data.customAssets)) return;
  data.customAssets.forEach((asset, i) => {
    const memoEl = document.getElementById(`memo-${i}`);
    const amountEl = document.getElementById(`amount-${i}`);
    if (memoEl) asset.memo = memoEl.value.trim();
    if (amountEl) {
      const raw = amountEl.value.replace(/[^0-9]/g, '');
      asset.amount = parseInt(raw, 10) || 0;
    }
  });
}

function deleteAsset(i) {
  if (i < 2) return;  // 자산1, 자산2는 삭제 불가
  if (!data.customAssets || !data.customAssets[i]) return;
  const label = `자산${i+1}` + (data.customAssets[i].memo ? ` (${data.customAssets[i].memo})` : '');
  if (!confirm(`${label} 항목을 삭제하시겠습니까?`)) return;
  captureAssetInputs();  // 다른 행 입력값 보존
  data.customAssets.splice(i, 1);
  save();
  render();
  showToast('삭제되었습니다');
}

function addAsset() {
  if (!Array.isArray(data.customAssets)) data.customAssets = [];
  captureAssetInputs();  // 기존 입력값 보존
  data.customAssets.push({ id: 'a' + Date.now(), memo: '', amount: 0 });
  save();
  render();
}

// ── Backup / Restore ──────────────────────────────────────────
function exportData() {
  toggleMenu();
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const ts = new Date().toISOString().slice(0,16).replace(/[:T]/g,'-');
  a.href = url;
  a.download = `stock_backup_${ts}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('백업 파일이 다운로드되었습니다');
}

  toggleMenu();
  const file = event.target.files[0];
  if (!file) return;
  if (!confirm('현재 데이터를 백업 파일 내용으로 덮어씁니다. 계속하시겠습니까?')) {
    event.target.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.accounts) throw new Error('잘못된 백업 파일입니다');
      // 마이그레이션 로직 적용
      const defaults = {
        mirae1: { name:'미래에셋증권 1', stocks:[], cash:0 },
        mirae2: { name:'미래에셋증권 2', stocks:[], cash:0 },
        mirae3: { name:'미래에셋증권 3', stocks:[], cash:0 },
        samsung: { name:'삼성증권', stocks:[], cash:0 }
      };
      Object.keys(defaults).forEach(k => {
        if (!imported.accounts[k]) imported.accounts[k] = defaults[k];
        else {
          if (!imported.accounts[k].stocks) imported.accounts[k].stocks = [];
          if (typeof imported.accounts[k].cash !== 'number') imported.accounts[k].cash = 0;
        }
      });
      // 자산 마이그레이션
      if (!Array.isArray(imported.customAssets)) {
        imported.customAssets = [
          { id:'a1', memo:'연금', amount:(typeof imported.pensionAsset === 'number' ? imported.pensionAsset : 0) },
          { id:'a2', memo:'기타', amount:(typeof imported.otherAsset === 'number' ? imported.otherAsset : 0) },
          { id:'a3', memo:'', amount:0 }
        ];
        delete imported.pensionAsset;
        delete imported.otherAsset;
      }
      if (!Array.isArray(imported.history)) imported.history = [];
      data = imported;
      save();
      render();
      showToast('✓ 복원 완료!');
    } catch(err) {
      showToast('복원 실패: ' + err.message);
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

function toggleMenu() {
  const m = document.getElementById('menu-dropdown');
  m.classList.toggle('open');
}

// 메뉴 외부 클릭 시 닫기
document.addEventListener('click', (e) => {
  const m = document.getElementById('menu-dropdown');
  const btn = e.target.closest('.icon-btn');
  if (!btn && m && !m.contains(e.target)) m.classList.remove('open');
});

function renderWatchlist(list) {
  const items = data.watchlist;
  if (items.length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">⭐</div><div class="empty-text">관심 종목이 없습니다<br>＋ 버튼을 눌러 추가하세요</div></div>`;
    return;
  }
  list.innerHTML = items.map(w => {
    const dayChg = (w.currentPrice && w.prevClose) ? ((w.currentPrice-w.prevClose)/w.prevClose*100) : null;
    let priceHtml;
    if (w.priceError) {
      priceHtml = `<div class="watch-price error-price">조회 실패</div>`;
    } else if (w.currentPrice) {
      priceHtml = `<div class="watch-price ${cls(dayChg)}">${fmtNum(w.currentPrice)}원</div>
        <div class="watch-change ${cls(dayChg)}">${dayChg !== null ? fmtPct(dayChg) : ''}</div>`;
    } else {
      priceHtml = `<div class="watch-price loading-price">시세 없음</div>`;
    }
    return `<div class="watch-card" onclick="openEditWatchModal('${w.id}')">
      <div class="watch-info"><div class="watch-name">${w.name}</div><div class="watch-code">${w.code}</div></div>
      <div class="watch-price-block">${priceHtml}</div>
    </div>`;
  }).join('');
}

// ── Tab ───────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  dailyDetailMode = false;  // 탭 전환 시 세부 모드 해제
  document.querySelectorAll('.tab').forEach((el, i) => {
    const tabs = ['mirae1','mirae2','mirae3','samsung','all'];
    el.classList.toggle('active', tabs[i] === tab);
  });
  render();
}

// ── Modal ─────────────────────────────────────────────────────
let boughtTodayFlag = false;

function setBoughtTodayUI(val) {
  boughtTodayFlag = !!val;
  const box = document.getElementById('f-bought-box');
  if (box) {
    box.classList.toggle('checked', boughtTodayFlag);
    box.textContent = boughtTodayFlag ? '✓' : '　';
  }
}
function toggleBoughtToday() { setBoughtTodayUI(!boughtTodayFlag); }

function openAddModal() {
  if (currentTab === 'all') {
    showToast('종목별 탭에서는 추가할 수 없습니다');
    return;
  }
  editingId = null;
  document.getElementById('modal-title').textContent = '종목 추가';
  document.getElementById('f-name').value = '';
  document.getElementById('f-code').value = '';
  document.getElementById('f-qty').value = '';
  document.getElementById('f-avg').value = '';
  document.getElementById('f-account').value = currentTab;
  setBoughtTodayUI(false);
  document.getElementById('modal-btns').innerHTML = `
    <button class="btn-ghost" onclick="closeModal()">취소</button>
    <button class="btn-primary" onclick="saveStock()">추가</button>`;
  document.getElementById('modal').classList.add('open');
}

function openEditModal(id) {
  const acc = ['mirae1','mirae2','mirae3','samsung'].find(a => data.accounts[a].stocks.find(s => s.id === id));
  if (!acc) return;
  const s = data.accounts[acc].stocks.find(s => s.id === id);
  editingId = id;
  document.getElementById('modal-title').textContent = '종목 수정';
  document.getElementById('f-name').value = s.name;
  document.getElementById('f-code').value = s.code;
  document.getElementById('f-qty').value = s.qty;
  document.getElementById('f-avg').value = s.avgPrice;
  document.getElementById('f-account').value = acc;
  setBoughtTodayUI(!!s.boughtToday);
  document.getElementById('modal-btns').innerHTML = `
    <button class="btn-danger" onclick="deleteStock()">삭제</button>
    <button class="btn-primary" onclick="saveStock()">저장</button>`;
  document.getElementById('modal').classList.add('open');
}

function saveStock() {
  const name = document.getElementById('f-name').value.trim();
  const code = document.getElementById('f-code').value.trim().toUpperCase();
  const qty = parseFloat(document.getElementById('f-qty').value);
  const avg = parseFloat(document.getElementById('f-avg').value);
  const acc = document.getElementById('f-account').value;
  const boughtToday = boughtTodayFlag;
  if (!name || !code || isNaN(qty) || isNaN(avg)) { showToast('모든 항목을 입력해주세요'); return; }

  if (editingId) {
    ['mirae1','mirae2','mirae3','samsung'].forEach(a => {
      const idx = data.accounts[a].stocks.findIndex(s => s.id === editingId);
      if (idx > -1) {
        const old = data.accounts[a].stocks[idx];
        const updated = { ...old, name, code, qty, avgPrice: avg, boughtToday };
        if (a !== acc) {
          data.accounts[a].stocks.splice(idx, 1);
          data.accounts[acc].stocks.push(updated);
        } else {
          data.accounts[a].stocks[idx] = updated;
        }
      }
    });
    showToast('수정되었습니다');
  } else {
    data.accounts[acc].stocks.push({ id: uid(), name, code, qty, avgPrice: avg, currentPrice: null, boughtToday });
    showToast('추가되었습니다');
  }
  save(); closeModal(); render();
}

function deleteStock() {
  if (!editingId) return;
  ['mirae1','mirae2','mirae3','samsung'].forEach(a => {
    data.accounts[a].stocks = data.accounts[a].stocks.filter(s => s.id !== editingId);
  });
  save(); closeModal(); render();
  showToast('삭제되었습니다');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }
function closeModalOutside(e) { if (e.target.id === 'modal') closeModal(); }

// ── Watch Modal ───────────────────────────────────────────────
function openAddWatchModal() {
  editingId = null;
  document.getElementById('watch-modal-title').textContent = '관심종목 추가';
  document.getElementById('wf-name').value = '';
  document.getElementById('wf-code').value = '';
  document.getElementById('watch-modal-btns').innerHTML = `
    <button class="btn-ghost" onclick="closeWatchModal()">취소</button>
    <button class="btn-primary" onclick="saveWatch()">추가</button>`;
  document.getElementById('watch-modal').classList.add('open');
}

function openEditWatchModal(id) {
  const w = data.watchlist.find(x => x.id === id);
  if (!w) return;
  editingId = id;
  document.getElementById('watch-modal-title').textContent = '관심종목 수정';
  document.getElementById('wf-name').value = w.name;
  document.getElementById('wf-code').value = w.code;
  document.getElementById('watch-modal-btns').innerHTML = `
    <button class="btn-danger" onclick="deleteWatch()">삭제</button>
    <button class="btn-primary" onclick="saveWatch()">저장</button>`;
  document.getElementById('watch-modal').classList.add('open');
}

function saveWatch() {
  const name = document.getElementById('wf-name').value.trim();
  const code = document.getElementById('wf-code').value.trim().toUpperCase();
  if (!name || !code) { showToast('종목명과 코드를 입력해주세요'); return; }
  if (editingId) {
    const w = data.watchlist.find(x => x.id === editingId);
    if (w) { w.name = name; w.code = code; }
    showToast('수정되었습니다');
  } else {
    data.watchlist.push({ id: uid(), name, code, currentPrice: null });
    showToast('추가되었습니다');
  }
  save(); closeWatchModal(); render();
}

function deleteWatch() {
  data.watchlist = data.watchlist.filter(w => w.id !== editingId);
  save(); closeWatchModal(); render();
  showToast('삭제되었습니다');
}

function closeWatchModal() { document.getElementById('watch-modal').classList.remove('open'); }
function closeWatchModalOutside(e) { if (e.target.id === 'watch-modal') closeWatchModal(); }

// ── Toast ─────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ── PIN Lock Screen ──────────────────────────────────────────
const PIN_KEY = 'app_pin_hash_v1';
let pinInput = '';
let pinSettingMode = null;  // null = login, 'set' = first time, 'confirm' = confirming
let firstPin = '';

function simpleHash(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = ((hash << 5) - hash) + str.charCodeAt(i);
    hash |= 0;
  }
  return hash.toString() + '_' + str.length;
}

function initLock() {
  const storedHash = localStorage.getItem(PIN_KEY);
  const subtitle = document.getElementById('lock-subtitle');
  const hint = document.getElementById('lock-hint');
  if (!storedHash) {
    pinSettingMode = 'set';
    subtitle.textContent = '새 비밀번호 4자리 입력';
    hint.innerHTML = '⚠️ 비밀번호를 잊으면 데이터를 복구할 수 없으니<br>반드시 백업을 받아두세요';
  } else {
    pinSettingMode = null;
    subtitle.textContent = '비밀번호 입력';
    hint.textContent = '';
  }

  document.querySelectorAll('.keypad-btn').forEach(btn => {
    const key = btn.dataset.key;
    if (!key) return;
    btn.onclick = () => handleKey(key);
  });
}

function handleKey(key) {
  // 진동 피드백 (15ms 짧은 진동)
  if (navigator.vibrate) navigator.vibrate(15);

  if (key === 'back') {
    pinInput = pinInput.slice(0, -1);
  } else if (key >= '0' && key <= '9') {
    if (pinInput.length < 4) pinInput += key;
  }
  updateDots();
  if (pinInput.length === 4) {
    setTimeout(handlePinComplete, 150);
  }
}

function updateDots() {
  const dots = document.querySelectorAll('.lock-dot');
  dots.forEach((dot, i) => {
    dot.classList.toggle('filled', i < pinInput.length);
    dot.classList.remove('error');
  });
}

function handlePinComplete() {
  const errEl = document.getElementById('lock-error');
  const subtitle = document.getElementById('lock-subtitle');

  if (pinSettingMode === 'set') {
    firstPin = pinInput;
    pinInput = '';
    pinSettingMode = 'confirm';
    subtitle.textContent = '한 번 더 입력해 주세요';
    updateDots();
  } else if (pinSettingMode === 'confirm') {
    if (pinInput === firstPin) {
      localStorage.setItem(PIN_KEY, simpleHash(pinInput));
      unlock();
    } else {
      errEl.textContent = '비밀번호가 일치하지 않습니다';
      shakeError();
      pinInput = '';
      firstPin = '';
      pinSettingMode = 'set';
      subtitle.textContent = '새 비밀번호 4자리 입력';
      setTimeout(() => { errEl.textContent = ''; updateDots(); }, 500);
    }
  } else {
    const stored = localStorage.getItem(PIN_KEY);
    if (simpleHash(pinInput) === stored) {
      unlock();
    } else {
      errEl.textContent = '비밀번호가 올바르지 않습니다';
      shakeError();
      pinInput = '';
      setTimeout(() => { errEl.textContent = ''; updateDots(); }, 500);
    }
  }
}

function shakeError() {
  document.querySelectorAll('.lock-dot').forEach(d => d.classList.add('error'));
  // 에러 진동 (짧게 2번)
  if (navigator.vibrate) navigator.vibrate([60, 80, 60]);
}

function unlock() {
  document.getElementById('lock-screen').classList.add('hidden');
  // 앱 시작
  render();
  const hasAnyStock = ['mirae1','mirae2','mirae3','samsung'].some(
    acc => data.accounts[acc].stocks.length > 0
  );
  if (hasAnyStock) refreshPrices();
}

function changePin() {
  if (!confirm('비밀번호를 변경하시겠습니까?\n현재 화면에서 잠금 해제됩니다.')) return;
  localStorage.removeItem(PIN_KEY);
  toggleMenu();
  document.getElementById('lock-screen').classList.remove('hidden');
  pinInput = '';
  firstPin = '';
  updateDots();
  initLock();
}

// ── Init ──────────────────────────────────────────────────────
initLock();

// 화면 당김 → 새로고침 (Pull to refresh)
let touchStartY = 0;
let pulling = false;

document.addEventListener('touchstart', (e) => {
  if (window.scrollY <= 0 && !isRefreshing) {
    touchStartY = e.touches[0].clientY;
    pulling = true;
  }
}, {passive: true});

document.addEventListener('touchmove', (e) => {
  if (!pulling || isRefreshing) return;
  const delta = e.touches[0].clientY - touchStartY;
  if (delta > 70) {
    pulling = false;
    refreshPrices();
  }
}, {passive: true});

document.addEventListener('touchend', () => {
  pulling = false;
});
</script>
